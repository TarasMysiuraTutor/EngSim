<svg width="100%" viewBox="0 0 540 175" role="img" xmlns="http://www.w3.org/2000/svg">
  <title
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    ENG-SIM animated logo</title>
  <desc
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    Анімований логотип ENG-SIM</desc>

  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff" />
      <stop offset="40%" style="stop-color:#a8d4ff" />
      <stop offset="100%" style="stop-color:#3a8fd4" />
    </linearGradient>
    <linearGradient id="simGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60c8ff" />
      <stop offset="50%" style="stop-color:#1a8fd4" />
      <stop offset="100%" style="stop-color:#0a5fa0" />
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7fa8" />
      <stop offset="50%" style="stop-color:#2a5a8a" />
      <stop offset="100%" style="stop-color:#0d2a4a" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6aaa;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#60c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a4a8a;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab0d8" />
      <stop offset="50%" style="stop-color:#c8e8ff" />
      <stop offset="100%" style="stop-color:#3a7aaa" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="62" cy="82" r="38" />
    </clipPath>
  </defs>

  <!-- GEAR centered at 62,82 -->
  <g
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animateTransform attributeName="transform" type="rotate" from="0 62 82" to="360 62 82" dur="12s"
      repeatCount="indefinite"
      style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <g fill="url(#gearGrad)" stroke="#3a6a9a" stroke-width="0.5" transform="translate(62,82)"
      style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <rect x="-5" y="-54" width="10" height="14" rx="2"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(30)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(60)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(90)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(120)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(150)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(180)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(210)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(240)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(270)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(300)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
      <rect x="-5" y="-54" width="10" height="14" rx="2" transform="rotate(330)"
        style="stroke:rgb(58, 106, 154);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    </g>
    <circle cx="62" cy="82" r="48" fill="none" stroke="url(#gearGrad)" stroke-width="9"
      style="fill:none;color:rgb(0, 0, 0);stroke-width:9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <circle cx="62" cy="82" r="48" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.6"
      style="fill:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <circle cx="62" cy="82" r="39" fill="#0e1e30" fill-opacity="0.95"
      style="fill:rgb(14, 30, 48);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <circle cx="62" cy="82" r="39" fill="none" stroke="#2a5a8a" stroke-width="0.8"
      style="fill:none;stroke:rgb(42, 90, 138);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <circle cx="62" cy="82" r="9" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="1"
      style="fill:rgb(26, 58, 90);stroke:rgb(58, 122, 170);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <circle cx="62" cy="82" r="4" fill="#2a5a8a" stroke="#60a8d8" stroke-width="0.8"
      style="fill:rgb(42, 90, 138);stroke:rgb(96, 168, 216);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
  </g>

  <!-- Wave inside gear -->
  <g clip-path="url(#circleClip)"
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <path fill="url(#waveGrad)" opacity="0.85"
      style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d"
        values="M24 82 C32 65,40 58,48 66 C55 73,62 51,72 54 C82 57,89 73,100 70 L100 124 L24 124 Z;&#10;                M24 82 C32 72,40 46,48 54 C55 61,62 39,72 42 C82 45,89 61,100 58 L100 124 L24 124 Z;&#10;                M24 82 C32 65,40 58,48 66 C55 73,62 51,72 54 C82 57,89 73,100 70 L100 124 L24 124 Z"
        dur="3s" repeatCount="indefinite"
        style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    </path>
    <path fill="none" stroke="#60d8ff" stroke-width="2" filter="url(#glow)"
      style="fill:none;stroke:rgb(96, 216, 255);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d"
        values="M24 82 C32 65,40 58,48 66 C55 73,62 51,72 54 C82 57,89 73,100 70;&#10;                M24 82 C32 72,40 46,48 54 C55 61,62 39,72 42 C82 45,89 61,100 58;&#10;                M24 82 C32 65,40 58,48 66 C55 73,62 51,72 54 C82 57,89 73,100 70"
        dur="3s" repeatCount="indefinite"
        style="fill:none;stroke:rgb(96, 216, 255);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    </path>
    <path fill="none" stroke="#a0e8ff" stroke-width="1.2" opacity="0.7"
      style="fill:none;stroke:rgb(160, 232, 255);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d"
        values="M24 90 L35 90 L40 80 L45 100 L50 75 L55 90 L100 90;&#10;                M24 92 L35 92 L40 82 L45 102 L50 77 L55 92 L100 92;&#10;                M24 90 L35 90 L40 80 L45 100 L50 75 L55 90 L100 90"
        dur="1.5s" repeatCount="indefinite"
        style="fill:none;stroke:rgb(160, 232, 255);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    </path>
  </g>

  <!-- Glow ring -->
  <circle cx="62" cy="82" r="48" fill="none" stroke="#1a6aaa" stroke-width="2" opacity="0.35" filter="url(#softglow)"
    style="fill:none;stroke:rgb(26, 106, 170);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.265246;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="2.5s" repeatCount="indefinite"
      style="fill:none;stroke:rgb(26, 106, 170);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
  </circle>

  <!-- ENG-SIM: italic, shifted up, x=122 -->
  <text font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="70" font-style="italic"
    letter-spacing="-1" stroke="#0a2a4a" stroke-width="4" stroke-linejoin="round" paint-order="stroke fill"
    style="fill:rgb(0, 0, 0);stroke:rgb(10, 42, 74);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Black&quot;, Arial, sans-serif;font-size:70px;font-weight:900;font-style:italic;text-anchor:start;dominant-baseline:auto">
    <tspan x="122" y="92" fill="url(#textGrad)"
      style="stroke:rgb(10, 42, 74);color:rgb(0, 0, 0);
      stroke-width:4px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;
      font-family:&quot;Arial Black&quot;, Arial, sans-serif;
      font-size:70px;font-weight:900;font-style:italic;text-anchor:start;dominant-baseline:auto">
      ENG-</tspan>
    <tspan fill="url(#simGrad)" filter="url(#glow)"
      style="stroke:rgb(10, 42, 74);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Black&quot;, Arial, sans-serif;font-size:70px;font-weight:900;font-style:italic;text-anchor:start;dominant-baseline:auto">
      SIM</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"
      style="fill:rgb(0, 0, 0);stroke:rgb(10, 42, 74);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Black&quot;, Arial, sans-serif;font-size:70px;font-weight:900;font-style:italic;text-anchor:start;dominant-baseline:auto" />
  </text>

  <!-- Subtitle: small gap below ENG-SIM baseline (y=92), so place at y=92+10=102, scaleY stretch -->
  <g transform="translate(122, 102) scale(1, 1.6)"
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <text x="0" y="22" font-family="Arial Narrow, Arial, sans-serif" font-weight="800" font-size="16" fill="#ffffff"
      stroke="#0a2040" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill" textLength="390"
      lengthAdjust="spacing"
      style="fill:rgb(255, 255, 255);stroke:rgb(10, 32, 64);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Narrow&quot;, Arial, sans-serif;font-size:16px;font-weight:800;text-anchor:start;dominant-baseline:auto">
      ENGINEERING CALCULATIONS &amp; SIMULATION
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.6s" fill="freeze"
        style="fill:rgb(255, 255, 255);stroke:rgb(10, 32, 64);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Narrow&quot;, Arial, sans-serif;font-size:16px;font-weight:800;text-anchor:start;dominant-baseline:auto" />
    </text>
  </g>

  <!-- Scanline -->
  <rect x="0" y="0" width="540" height="2" rx="1" fill="#60c8ff" opacity="0.3"
    style="fill:rgb(96, 200, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.146604;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="y" values="-5;180;-5" dur="4s" repeatCount="indefinite"
      style="fill:rgb(96, 200, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"
      style="fill:rgb(96, 200, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />
  </rect>

</svg>